name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          release-type: node
          # Uses package.json version as the source of truth
          # Conventional commits on main auto-update the release PR
          # Merging the release PR → creates tag + GitHub Release
